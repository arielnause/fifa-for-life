<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FIFA for Life">
  <meta name="theme-color" content="#1a7a3c">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>FIFA for Life</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --green: #1a7a3c;
      --green-light: #e8f5ed;
      --bg: #f2f2f7;
      --card: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text: #1c1c1e;
      --muted: #6b6b6b;
      --secondary-bg: #f2f2f7;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --border: rgba(255,255,255,0.12);
        --text: #ffffff;
        --muted: #8e8e93;
        --secondary-bg: #2c2c2e;
        --green-light: #0d3320;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      background: var(--green);
      padding: calc(var(--safe-top) + 16px) 16px 14px;
      flex-shrink: 0;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
    .header h1 { font-size: 22px; font-weight: 700; color: white; letter-spacing: -0.5px; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.75); }
    .season-badge { background: rgba(255,255,255,0.22); font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; color: white; }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--card);
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0 calc(10px);
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      user-select: none;
    }
    .tab .tab-icon { font-size: 18px; display: block; margin-bottom: 2px; }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* CONTENT */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 12px calc(14px + var(--safe-bottom));
    }

    /* STANDINGS */
    .standings-table { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border); overflow: hidden; }
    .st-head { display: grid; grid-template-columns: 20px 1fr 24px 24px 28px 24px 34px; gap: 3px; padding: 8px 12px; background: var(--secondary-bg); font-size: 11px; font-weight: 600; color: var(--muted); align-items: center; }
    .st-row { display: grid; grid-template-columns: 20px 1fr 24px 24px 28px 24px 34px; gap: 3px; padding: 10px 12px; border-top: 0.5px solid var(--border); align-items: center; }
    .st-row.leader { background: var(--green-light); }
    .st-pos { font-size: 12px; font-weight: 600; color: var(--muted); }
    .st-pos.top { color: var(--green); }
    .st-pos.bot { color: #c0392b; }
    .st-name { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
    .name-label { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .st-num { font-size: 13px; color: var(--muted); text-align: center; }
    .st-pts { font-size: 14px; font-weight: 700; color: var(--text); text-align: center; }
    .form-dots { display: flex; gap: 3px; margin-top: 2px; }
    .fd { width: 7px; height: 7px; border-radius: 50%; }
    .fd.W { background: var(--green); }
    .fd.D { background: #e0a800; }
    .fd.L { background: #c0392b; }
    .hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; }

    /* RESULTS */
    .results-list { display: flex; flex-direction: column; gap: 10px; }
    .result-card { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border); padding: 12px 14px; }
    .result-date { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .result-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .r-name { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
    .r-name.right { text-align: right; }
    .r-score { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .score-box { background: var(--secondary-bg); border-radius: 8px; padding: 5px 12px; font-size: 20px; font-weight: 700; color: var(--text); min-width: 42px; text-align: center; }
    .score-sep { font-size: 13px; color: var(--muted); }
    .r-team { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .r-team.right { text-align: right; }
    .r-badges { display: flex; justify-content: space-between; margin-top: 7px; }
    .ob { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .ob-w { background: var(--green-light); color: var(--green); }
    .ob-d { background: #fef9e7; color: #b7950b; }
    .ob-l { background: #fdedec; color: #c0392b; }

    /* DRAW */
    .draw-section { display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border); padding: 14px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; }
    .player-checks { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 12px; }
    .pcheck {
      display: flex; align-items: center; gap: 8px;
      background: var(--secondary-bg); border-radius: 10px;
      padding: 10px 11px; cursor: pointer;
      border: 1.5px solid transparent; transition: all .15s;
      user-select: none;
    }
    .pcheck.selected { border-color: var(--green); background: var(--green-light); }
    .pcheck-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .sel-count { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 10px; }
    .team-block { border-radius: 10px; padding: 12px; margin-bottom: 8px; border: 0.5px solid var(--border); }
    .team-label { font-size: 11px; font-weight: 700; margin-bottom: 7px; letter-spacing: .2px; }
    .team-players { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .team-vs { text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); margin: 4px 0; }
    .odd-block { display: flex; align-items: center; gap: 10px; background: var(--secondary-bg); border-radius: 10px; padding: 10px 12px; border: 0.5px solid var(--border); margin-top: 4px; }

    /* ADD */
    .add-form { display: flex; flex-direction: column; gap: 12px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .row { display: flex; align-items: center; gap: 10px; }
    select, input[type=number], input[type=date] {
      background: var(--secondary-bg);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      -webkit-appearance: none;
      font-family: inherit;
    }
    select { flex: 1; }
    input[type=number] { width: 60px; text-align: center; font-weight: 700; }
    input[type=date] { width: 100%; }
    input[type=number]:focus, select:focus, input[type=date]:focus { border-color: var(--green); }

    /* BUTTONS */
    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--green); color: white;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity .15s;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-primary:disabled { opacity: 0.35; cursor: default; }
    .btn-ghost {
      background: none; border: none;
      font-size: 13px; color: var(--muted);
      cursor: pointer; padding: 6px 0;
      font-family: inherit; width: 100%; text-align: center;
    }
    .success-banner {
      background: var(--green-light); color: var(--green);
      border-radius: 10px; padding: 10px;
      text-align: center; font-size: 13px; font-weight: 600;
      display: none;
    }
    .info-banner {
      background: var(--green-light); color: var(--green);
      border-radius: 10px; padding: 10px 12px;
      font-size: 12px; font-weight: 500;
    }

    .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 10px; }
    .empty p { font-size: 15px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>⚽ FIFA for Life</h1>
      <span class="season-badge">Season 1</span>
    </div>
    <div class="header-sub" id="header-sub">7 players</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('standings')">
      <span class="tab-icon">🏆</span>Table
    </div>
    <div class="tab" onclick="showTab('draw')">
      <span class="tab-icon">🔀</span>Draw
    </div>
    <div class="tab" onclick="showTab('results')">
      <span class="tab-icon">⚽</span>Results
    </div>
    <div class="tab" onclick="showTab('add')">
      <span class="tab-icon">➕</span>Add
    </div>
  </div>

  <div class="content">
    <div id="tab-standings"></div>
    <div id="tab-draw" style="display:none"></div>
    <div id="tab-results" style="display:none"></div>
    <div id="tab-add" style="display:none"></div>
  </div>
</div>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>
<script>
const STORAGE_KEY = 'fifa_for_life_v1';

const PALETTE = [
  { color: '#185FA5', bg: '#dbeafe' },
  { color: '#534AB7', bg: '#ede9fe' },
  { color: '#993C1D', bg: '#fee2d5' },
  { color: '#3B6D11', bg: '#dcfce7' },
  { color: '#854F0B', bg: '#fef3c7' },
  { color: '#993556', bg: '#fce7f3' },
  { color: '#0F6E56', bg: '#d1fae5' },
];

const INIT_PLAYERS = [
  { id: 1, name: 'Gay',    ...PALETTE[0] },
  { id: 2, name: 'Amos',   ...PALETTE[1] },
  { id: 3, name: 'Shalom', ...PALETTE[2] },
  { id: 4, name: 'Nissim', ...PALETTE[3] },
  { id: 5, name: 'Idan',   ...PALETTE[4] },
  { id: 6, name: 'Ronen',  ...PALETTE[5] },
  { id: 7, name: 'Yoav',   ...PALETTE[6] },
];

let state = { players: INIT_PLAYERS, matches: [], nextId: 1, nextPid: 8 };
let currentTab = 'standings';
let lastDraw = null;
let selectedPlayers = new Set();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch (e) {}
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function ini(name) { return name.slice(0, 2).toUpperCase(); }

function avatar(p, size = 28, fontSize = 11) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fontSize}px;background:${p.bg};color:${p.color}">${ini(p.name)}</div>`;
}

function getStandings() {
  const map = {};
  state.players.forEach(p => {
    map[p.id] = { ...p, P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, Pts: 0, form: [] };
  });
  [...state.matches]
    .sort((a, b) => a.date.localeCompare(b.date))
    .forEach(m => {
      const h = map[m.home], a = map[m.away];
      if (!h || !a) return;
      h.P++; a.P++;
      h.GF += m.homeGoals; h.GA += m.awayGoals;
      a.GF += m.awayGoals; a.GA += m.homeGoals;
      if (m.homeGoals > m.awayGoals) {
        h.W++; h.Pts += 3; a.L++; h.form.push('W'); a.form.push('L');
      } else if (m.homeGoals < m.awayGoals) {
        a.W++; a.Pts += 3; h.L++; a.form.push('W'); h.form.push('L');
      } else {
        h.D++; a.D++; h.Pts++; a.Pts++; h.form.push('D'); a.form.push('D');
      }
    });
  return Object.values(map).sort((a, b) =>
    b.Pts - a.Pts || (b.GF - b.GA) - (a.GF - a.GA) || b.GF - a.GF
  );
}

function renderStandings() {
  const st = getStandings();
  if (!st.length) {
    return `<div class="empty"><div class="empty-icon">👥</div><p>No players yet</p></div>`;
  }
  const rows = st.map((p, i) => {
    const gd = p.GF - p.GA;
    const posClass = i === 0 ? 'top' : (i === st.length - 1 && st.length > 1 ? 'bot' : '');
    const form = p.form.slice(-5).map(f => `<span class="fd ${f}"></span>`).join('');
    return `<div class="st-row ${i === 0 ? 'leader' : ''}">
      <div class="st-pos ${posClass}">${i + 1}</div>
      <div class="st-name">
        ${avatar(p, 28, 11)}
        <div style="min-width:0">
          <div class="name-label">${p.name}</div>
          <div class="form-dots">${form}</div>
        </div>
      </div>
      <div class="st-num">${p.P}</div>
      <div class="st-num">${p.W}</div>
      <div class="st-num">${gd > 0 ? '+' : ''}${gd}</div>
      <div class="st-num">${p.GF}</div>
      <div class="st-pts">${p.Pts}</div>
    </div>`;
  }).join('');
  return `
    <div class="standings-table">
      <div class="st-head">
        <span>#</span><span>Player</span><span>P</span><span>W</span><span>GD</span><span>GF</span><span>Pts</span>
      </div>
      ${rows}
    </div>
    <p class="hint">🟢 leader &nbsp;·&nbsp; dots = last 5</p>`;
}

function renderDraw() {
  const checks = state.players.map(p => {
    const sel = selectedPlayers.has(p.id);
    return `<div class="pcheck ${sel ? 'selected' : ''}" onclick="toggleCheck(${p.id})">
      ${avatar(p, 26, 10)}
      <span class="pcheck-name">${p.name}</span>
    </div>`;
  }).join('');

  const teamColors = [
    { bg: '#dbeafe', color: '#185FA5' },
    { bg: '#ede9fe', color: '#534AB7' },
    { bg: '#dcfce7', color: '#3B6D11' },
    { bg: '#fef3c7', color: '#854F0B' },
  ];

  let drawHtml = '';
  if (lastDraw && lastDraw.teams) {
    const teamBlocks = lastDraw.teams.map((team, i) => {
      const p1 = state.players.find(p => p.id === team[0]);
      const p2 = state.players.find(p => p.id === team[1]);
      if (!p1 || !p2) return '';
      const c = teamColors[i % teamColors.length];
      return `
        <div class="team-block" style="background:${c.bg};border-color:${c.color}50">
          <div class="team-label" style="color:${c.color}">Team ${i + 1}</div>
          <div class="team-players">
            ${avatar(p1, 32, 12)}
            <span style="font-size:15px;font-weight:600;color:#1c1c1e">${p1.name}</span>
            <span style="font-size:13px;color:#6b6b6b">&amp;</span>
            ${avatar(p2, 32, 12)}
            <span style="font-size:15px;font-weight:600;color:#1c1c1e">${p2.name}</span>
          </div>
        </div>`;
    }).join('<div class="team-vs">vs</div>');

    let oddHtml = '';
    if (lastDraw.odd) {
      const op = state.players.find(p => p.id === lastDraw.odd);
      if (op) oddHtml = `
        <div class="odd-block">
          ${avatar(op, 28, 11)}
          <div>
            <div style="font-size:11px;color:#6b6b6b">Sits out this round</div>
            <div style="font-size:14px;font-weight:600">${op.name}</div>
          </div>
        </div>`;
    }

    drawHtml = `
      <div class="card">
        <div class="card-title">🎯 Today's teams</div>
        ${teamBlocks}
        ${oddHtml}
        <button class="btn-primary" style="margin-top:12px" onclick="showTab('add')">Add result for these teams</button>
      </div>`;
  }

  return `
    <div class="draw-section">
      <div class="card">
        <div class="card-title">Who's playing today?</div>
        <div class="player-checks">${checks}</div>
        <div class="sel-count" id="sel-count">${selectedPlayers.size} selected</div>
        <button class="btn-primary" id="draw-btn" onclick="doDraw()" ${selectedPlayers.size < 4 ? 'disabled' : ''}>
          🔀 Draw teams
        </button>
      </div>
      ${drawHtml}
    </div>`;
}

function toggleCheck(id) {
  if (selectedPlayers.has(id)) selectedPlayers.delete(id);
  else selectedPlayers.add(id);
  document.querySelectorAll('.pcheck').forEach(el => {
    const eid = parseInt(el.getAttribute('onclick').match(/\d+/)[0]);
    el.classList.toggle('selected', selectedPlayers.has(eid));
  });
  const cnt = document.getElementById('sel-count');
  if (cnt) cnt.textContent = selectedPlayers.size + ' selected';
  const btn = document.getElementById('draw-btn');
  if (btn) btn.disabled = selectedPlayers.size < 4;
}

function doDraw() {
  const ids = [...selectedPlayers].sort(() => Math.random() - 0.5);
  if (ids.length < 4) return;
  const teams = [];
  for (let i = 0; i < Math.floor(ids.length / 2); i++) {
    teams.push([ids[i * 2], ids[i * 2 + 1]]);
  }
  const odd = ids.length % 2 === 1 ? ids[ids.length - 1] : null;
  lastDraw = { teams, odd };
  render();
}

function renderResults() {
  if (!state.matches.length) {
    return `<div class="empty"><div class="empty-icon">⚽</div><p>No matches yet — add the first result!</p></div>`;
  }
  const pm = {};
  state.players.forEach(p => pm[p.id] = p);
  const cards = [...state.matches]
    .sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id)
    .map(m => {
      const h = pm[m.home], a = pm[m.away];
      if (!h || !a) return '';
      let hb, ab;
      if (m.homeGoals > m.awayGoals) { hb = 'ob-w'; ab = 'ob-l'; }
      else if (m.homeGoals < m.awayGoals) { hb = 'ob-l'; ab = 'ob-w'; }
      else { hb = ab = 'ob-d'; }
      const wl = (cls) => cls === 'ob-w' ? 'W' : cls === 'ob-l' ? 'L' : 'D';
      const ds = new Date(m.date + 'T12:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
      const tA = m.teamA ? `<div class="r-team">${m.teamA}</div>` : '';
      const tB = m.teamB ? `<div class="r-team right">${m.teamB}</div>` : '';
      return `
        <div class="result-card">
          <div class="result-date">${ds}</div>
          <div class="result-row">
            <div style="flex:1"><div class="r-name">${h.name}</div>${tA}</div>
            <div class="r-score">
              <div class="score-box">${m.homeGoals}</div>
              <div class="score-sep">–</div>
              <div class="score-box">${m.awayGoals}</div>
            </div>
            <div style="flex:1;text-align:right"><div class="r-name right">${a.name}</div>${tB}</div>
          </div>
          <div class="r-badges">
            <span class="ob ${hb}">${wl(hb)}</span>
            <span class="ob ${ab}">${wl(ab)}</span>
          </div>
        </div>`;
    }).join('');
  return `<div class="results-list">${cards}</div>`;
}

function renderAdd() {
  const today = new Date().toISOString().slice(0, 10);

  if (lastDraw && lastDraw.teams && lastDraw.teams.length >= 2) {
    const t1 = lastDraw.teams[0], t2 = lastDraw.teams[1];
    const n = id => { const p = state.players.find(p => p.id === id); return p ? p.name : ''; };
    const tALabel = `${n(t1[0])} & ${n(t1[1])}`;
    const tBLabel = `${n(t2[0])} & ${n(t2[1])}`;
    const mkOpts = team => team.map(id => {
      const p = state.players.find(p => p.id === id);
      return p ? `<option value="${p.id}">${p.name}</option>` : '';
    }).join('');

    return `
      <div class="add-form">
        <div class="info-banner">🔀 Using today's draw — pick winner from each team</div>
        <div>
          <div class="field-label">Team 1 — ${tALabel}</div>
          <div class="row">
            <select id="sel-home">${mkOpts(t1)}</select>
            <input type="number" id="sc-home" value="0" min="0" max="99">
          </div>
        </div>
        <div>
          <div class="field-label">Team 2 — ${tBLabel}</div>
          <div class="row">
            <select id="sel-away">${mkOpts(t2)}</select>
            <input type="number" id="sc-away" value="0" min="0" max="99">
          </div>
        </div>
        <div>
          <div class="field-label">Date</div>
          <input type="date" id="match-date" value="${today}">
        </div>
        <button class="btn-primary" onclick="addMatch('${tALabel}','${tBLabel}')">Save result</button>
        <div class="success-banner" id="success-msg">✅ Saved!</div>
        <button class="btn-ghost" onclick="lastDraw=null;render()">Enter manually instead</button>
      </div>`;
  }

  const opts = state.players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  return `
    <div class="add-form">
      <div>
        <div class="field-label">Home player</div>
        <div class="row">
          <select id="sel-home">${opts}</select>
          <input type="number" id="sc-home" value="0" min="0" max="99">
        </div>
      </div>
      <div>
        <div class="field-label">Away player</div>
        <div class="row">
          <select id="sel-away">${opts}</select>
          <input type="number" id="sc-away" value="0" min="0" max="99">
        </div>
      </div>
      <div>
        <div class="field-label">Date</div>
        <input type="date" id="match-date" value="${today}">
      </div>
      <button class="btn-primary" onclick="addMatch()">Save result</button>
      <div class="success-banner" id="success-msg">✅ Saved!</div>
    </div>`;
}

function addMatch(teamALabel, teamBLabel) {
  const home = parseInt(document.getElementById('sel-home').value);
  const away = parseInt(document.getElementById('sel-away').value);
  const hg = parseInt(document.getElementById('sc-home').value) || 0;
  const ag = parseInt(document.getElementById('sc-away').value) || 0;
  const date = document.getElementById('match-date').value || new Date().toISOString().slice(0, 10);
  if (home === away) { alert('Pick two different players!'); return; }
  const entry = { id: state.nextId++, home, away, homeGoals: hg, awayGoals: ag, date };
  if (teamALabel) entry.teamA = teamALabel;
  if (teamBLabel) entry.teamB = teamBLabel;
  state.matches.push(entry);
  save();
  const msg = document.getElementById('success-msg');
  msg.style.display = 'block';
  setTimeout(() => { msg.style.display = 'none'; lastDraw = null; showTab('results'); }, 1000);
}

function showTab(tab) {
  currentTab = tab;
  ['standings', 'draw', 'results', 'add'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['standings', 'draw', 'results', 'add'][i] === tab);
  });
  render();
}

function render() {
  const map = { standings: renderStandings, draw: renderDraw, results: renderResults, add: renderAdd };
  document.getElementById('tab-' + currentTab).innerHTML = map[currentTab]();
  document.getElementById('header-sub').textContent =
    `${state.players.length} players · ${state.matches.length} matches`;
}

loadState();
render();

</script>
</body>
</html>
