<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FIFA for Life">
  <meta name="theme-color" content="#1a7a3c">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>FIFA for Life</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --green:#1a7a3c; --green-light:#e8f5ed;
      --bg:#f2f2f7; --card:#ffffff; --border:rgba(0,0,0,0.1);
      --text:#1c1c1e; --muted:#6b6b6b; --sub:#f2f2f7;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#000; --card:#1c1c1e; --border:rgba(255,255,255,0.12); --text:#fff; --muted:#8e8e93; --sub:#2c2c2e; --green-light:#0d3320; }
    }
    html,body { height:100%; background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,sans-serif; color:var(--text); overflow:hidden; }
    .app { display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:430px; margin:0 auto; }

    .header { background:var(--green); padding:calc(env(safe-area-inset-top)+16px) 16px 14px; flex-shrink:0; }
    .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
    .header h1 { font-size:21px; font-weight:700; color:white; letter-spacing:-0.4px; }
    .header-sub { font-size:12px; color:rgba(255,255,255,0.75); }
    .badge { background:rgba(255,255,255,0.22); font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; color:white; }

    .tabs { display:flex; background:var(--card); border-bottom:0.5px solid var(--border); flex-shrink:0; }
    .tab { flex:1; text-align:center; padding:8px 0; font-size:10px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; user-select:none; }
    .tab span { font-size:20px; display:block; margin-bottom:1px; }
    .tab.active { color:var(--green); border-bottom-color:var(--green); }

    .content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 12px calc(12px + env(safe-area-inset-bottom)); }

    .card { background:var(--card); border-radius:14px; border:0.5px solid var(--border); padding:14px; margin-bottom:12px; }
    .card-title { font-size:13px; font-weight:600; color:var(--muted); margin-bottom:12px; }

    /* STANDINGS - simpler columns: # | Player | P | W | L | Pts */
    .table-wrap { background:var(--card); border-radius:14px; border:0.5px solid var(--border); overflow:hidden; margin-bottom:10px; }
    .st-head, .st-row { display:grid; grid-template-columns:20px 1fr 28px 28px 28px 38px; gap:2px; padding:9px 12px; align-items:center; }
    .st-head { background:var(--sub); font-size:11px; font-weight:600; color:var(--muted); }
    .st-row { border-top:0.5px solid var(--border); }
    .st-row.gold { background:var(--green-light); }
    .pos { font-size:12px; font-weight:600; color:var(--muted); }
    .pos.p1 { color:var(--green); }
    .pos.last { color:#c0392b; }
    .st-name { display:flex; align-items:center; gap:7px; min-width:0; }
    .av { border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
    .pname { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .num { font-size:12px; color:var(--muted); text-align:center; }
    .pts { font-size:14px; font-weight:700; color:var(--text); text-align:center; }
    .dots { display:flex; gap:3px; margin-top:2px; }
    .dot { width:7px; height:7px; border-radius:50%; }
    .dot.W { background:var(--green); }
    .dot.L { background:#c0392b; }

    /* RESULTS */
    .rc { background:var(--card); border-radius:14px; border:0.5px solid var(--border); padding:12px 14px; margin-bottom:10px; }
    .rc-date { font-size:11px; color:var(--muted); margin-bottom:8px; }
    .rc-row { display:flex; align-items:center; gap:8px; }
    .rc-team { flex:1; }
    .rc-team.r { text-align:right; }
    .rc-team-name { font-size:14px; font-weight:600; color:var(--text); }
    .rc-team-sub { font-size:11px; color:var(--muted); margin-top:1px; }
    .rc-mid { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; }
    .winner-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
    .wb-w { background:var(--green-light); color:var(--green); }
    .wb-l { background:#fdedec; color:#c0392b; }
    .vs-txt { font-size:12px; color:var(--muted); }

    /* DRAW */
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .pcheck { display:flex; align-items:center; gap:8px; background:var(--sub); border-radius:10px; padding:10px; cursor:pointer; border:2px solid transparent; transition:all .15s; user-select:none; }
    .pcheck.on { border-color:var(--green); background:var(--green-light); }
    .pcheck-name { font-size:14px; font-weight:500; color:var(--text); }
    .sel-hint { font-size:12px; color:var(--muted); text-align:center; margin-bottom:10px; }
    .team-block { border-radius:10px; padding:12px; margin-bottom:8px; }
    .team-label { font-size:11px; font-weight:700; margin-bottom:8px; }
    .team-duo { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .team-duo .tname { font-size:15px; font-weight:600; color:var(--text); }
    .vs-line { text-align:center; font-size:12px; color:var(--muted); margin:4px 0; }
    .odd-block { display:flex; align-items:center; gap:10px; background:var(--sub); border-radius:10px; padding:10px 12px; margin-top:6px; }

    /* ADD FORM */
    .form { display:flex; flex-direction:column; gap:14px; }
    .fl { font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; }
    .winner-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .wopt { background:var(--sub); border-radius:12px; padding:14px 10px; text-align:center; cursor:pointer; border:2px solid transparent; transition:all .15s; user-select:none; }
    .wopt.selected { border-color:var(--green); background:var(--green-light); }
    .wopt-label { font-size:11px; font-weight:600; color:var(--muted); margin-bottom:6px; }
    .wopt-name { font-size:15px; font-weight:700; color:var(--text); }
    .wopt-sub { font-size:11px; color:var(--muted); margin-top:3px; }
    select, input[type=date] { background:var(--sub); border:0.5px solid var(--border); border-radius:10px; color:var(--text); font-size:15px; padding:10px 12px; outline:none; -webkit-appearance:none; font-family:inherit; width:100%; }
    .info-box { background:var(--green-light); color:var(--green); border-radius:10px; padding:10px 12px; font-size:13px; font-weight:500; }

    .btn { width:100%; padding:14px; background:var(--green); color:white; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn:active { opacity:0.8; }
    .btn:disabled { opacity:0.35; cursor:default; }
    .btn-ghost { background:none; border:none; font-size:13px; color:var(--muted); cursor:pointer; padding:6px 0; font-family:inherit; width:100%; text-align:center; }
    .saved { background:var(--green-light); color:var(--green); border-radius:10px; padding:10px; text-align:center; font-size:14px; font-weight:600; display:none; }
    .empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty p { font-size:15px; margin-top:8px; }
    .hint { font-size:11px; color:var(--muted); text-align:center; margin-top:8px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>⚽ FIFA for Life</h1>
      <span class="badge">Season 1</span>
    </div>
    <div class="header-sub" id="sub">7 players · 0 matches</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="go('standings')"><span>🏆</span>Table</div>
    <div class="tab" onclick="go('draw')"><span>🔀</span>Draw</div>
    <div class="tab" onclick="go('results')"><span>⚽</span>Results</div>
    <div class="tab" onclick="go('add')"><span>➕</span>Add</div>
  </div>
  <div class="content">
    <div id="standings"></div>
    <div id="draw" style="display:none"></div>
    <div id="results" style="display:none"></div>
    <div id="add" style="display:none"></div>
  </div>
</div>

<script>
const KEY = 'fifaforlife_v4';
const PAL = [
  {c:'#185FA5',b:'#dbeafe'},{c:'#534AB7',b:'#ede9fe'},{c:'#993C1D',b:'#fee2d5'},
  {c:'#3B6D11',b:'#dcfce7'},{c:'#854F0B',b:'#fef3c7'},{c:'#993556',b:'#fce7f3'},
  {c:'#0F6E56',b:'#d1fae5'}
];
const INIT = [
  {id:1,name:'Gay',...PAL[0]},{id:2,name:'Amos',...PAL[1]},{id:3,name:'Shalom',...PAL[2]},
  {id:4,name:'Nissim',...PAL[3]},{id:5,name:'Idan',...PAL[4]},{id:6,name:'Ronen',...PAL[5]},
  {id:7,name:'Yoav',...PAL[6]}
];

let S = {players:INIT, matches:[], nid:1};
let tab = 'standings';
let draw = null;
let sel = new Set();
let pickedWinner = null; // 't1' or 't2'

function load() { try { const r=localStorage.getItem(KEY); if(r) S=JSON.parse(r); } catch(e){} }
function save() { try { localStorage.setItem(KEY,JSON.stringify(S)); } catch(e){} }
function ini(n) { return n.slice(0,2).toUpperCase(); }
function av(p,sz=28,fs=11) {
  return `<div class="av" style="width:${sz}px;height:${sz}px;font-size:${fs}px;background:${p.b};color:${p.c}">${ini(p.name)}</div>`;
}
function pById(id) { return S.players.find(p=>p.id===id); }

function calcStandings() {
  const map = {};
  S.players.forEach(p => { map[p.id]={...p,P:0,W:0,L:0,Pts:0,form:[]}; });
  [...S.matches].sort((a,b)=>a.date.localeCompare(b.date)).forEach(m => {
    // tw1 = team1 player ids array, tw2 = team2. winner = 't1' or 't2'
    const winners = m.winner==='t1' ? m.tw1 : m.tw2;
    const losers  = m.winner==='t1' ? m.tw2 : m.tw1;
    [...winners,...losers].forEach(id=>{ if(map[id]) map[id].P++; });
    winners.forEach(id=>{ if(map[id]){ map[id].W++; map[id].Pts++; map[id].form.push('W'); }});
    losers.forEach(id=>{  if(map[id]){ map[id].L++;               map[id].form.push('L'); }});
  });
  return Object.values(map).sort((a,b)=>b.Pts-a.Pts||b.W-a.W);
}

function renderStandings() {
  const st = calcStandings();
  const rows = st.map((p,i) => {
    const pc = i===0?'p1':i===st.length-1&&st.length>1?'last':'';
    const form = p.form.slice(-5).map(f=>`<span class="dot ${f}"></span>`).join('');
    return `<div class="st-row${i===0?' gold':''}">
      <div class="pos ${pc}">${i+1}</div>
      <div class="st-name">${av(p,26,10)}<div style="min-width:0"><div class="pname">${p.name}</div><div class="dots">${form}</div></div></div>
      <div class="num">${p.P}</div>
      <div class="num">${p.W}</div>
      <div class="num">${p.L}</div>
      <div class="pts">${p.Pts}</div>
    </div>`;
  }).join('');
  return `<div class="table-wrap">
    <div class="st-head"><span>#</span><span>Player</span><span>P</span><span>W</span><span>L</span><span>Pts</span></div>
    ${rows}
  </div><p class="hint">🟢 leader · dots = last 5 games · 1 pt per win</p>`;
}

function renderDraw() {
  const checks = S.players.map(p =>
    `<div class="pcheck${sel.has(p.id)?' on':''}" onclick="toggleSel(${p.id})">${av(p,24,10)}<span class="pcheck-name">${p.name}</span></div>`
  ).join('');

  let drawOut = '';
  if(draw) {
    const tc = [{bg:'#dbeafe',c:'#185FA5'},{bg:'#ede9fe',c:'#534AB7'},{bg:'#dcfce7',c:'#3B6D11'},{bg:'#fef3c7',c:'#854F0B'}];
    const blocks = draw.teams.map((team,i) => {
      const p1=pById(team[0]), p2=pById(team[1]);
      if(!p1||!p2) return '';
      const col=tc[i%tc.length];
      return `<div class="team-block" style="background:${col.bg};border:1px solid ${col.c}40;border-radius:10px">
        <div class="team-label" style="color:${col.c}">Team ${i+1}</div>
        <div class="team-duo">${av(p1,30,12)}<span class="tname">${p1.name}</span>
        <span style="color:var(--muted);font-size:13px">&amp;</span>${av(p2,30,12)}<span class="tname">${p2.name}</span></div>
      </div>`;
    }).join('<div class="vs-line">vs</div>');

    let oddHtml = '';
    if(draw.odd) {
      const op=pById(draw.odd);
      if(op) oddHtml=`<div class="odd-block">${av(op,28,11)}
        <div><div style="font-size:11px;color:var(--muted)">Sits out</div><div style="font-size:14px;font-weight:600">${op.name}</div></div>
      </div>`;
    }
    drawOut=`<div class="card"><div class="card-title">🎯 Today's teams</div>${blocks}${oddHtml}
      <button class="btn" style="margin-top:12px" onclick="go('add')">Add result for these teams</button>
    </div>`;
  }

  return `<div class="card"><div class="card-title">Who's playing today?</div>
    <div class="grid2">${checks}</div>
    <div class="sel-hint" id="sc">${sel.size} selected (need at least 4)</div>
    <button class="btn" id="dbtn" onclick="doDraw()" ${sel.size<4?'disabled':''}>🔀 Draw teams</button>
  </div>${drawOut}`;
}

function toggleSel(id) {
  sel.has(id)?sel.delete(id):sel.add(id);
  document.querySelectorAll('.pcheck').forEach((el,i)=>{
    el.classList.toggle('on',sel.has(S.players[i].id));
  });
  const sc=document.getElementById('sc');
  if(sc) sc.textContent=sel.size+' selected (need at least 4)';
  const btn=document.getElementById('dbtn');
  if(btn) btn.disabled=sel.size<4;
}

function doDraw() {
  const ids=[...sel].sort(()=>Math.random()-0.5);
  const teams=[];
  for(let i=0;i<Math.floor(ids.length/2);i++) teams.push([ids[i*2],ids[i*2+1]]);
  draw={teams, odd:ids.length%2===1?ids[ids.length-1]:null};
  pickedWinner=null;
  render();
}

function renderResults() {
  if(!S.matches.length) return `<div class="empty"><p>⚽</p><p>No matches yet</p></div>`;
  const pm={};
  S.players.forEach(p=>pm[p.id]=p);
  return [...S.matches].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id).map(m=>{
    const ds=new Date(m.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    const t1names=m.tw1.map(id=>pm[id]?pm[id].name:'?').join(' & ');
    const t2names=m.tw2.map(id=>pm[id]?pm[id].name:'?').join(' & ');
    const t1win=m.winner==='t1';
    return `<div class="rc">
      <div class="rc-date">${ds}</div>
      <div class="rc-row">
        <div class="rc-team">
          <div class="rc-team-name">${t1names}</div>
        </div>
        <div class="rc-mid">
          <span class="winner-badge ${t1win?'wb-w':'wb-l'}">${t1win?'WIN':'LOSS'}</span>
          <span class="vs-txt">vs</span>
          <span class="winner-badge ${!t1win?'wb-w':'wb-l'}">${!t1win?'WIN':'LOSS'}</span>
        </div>
        <div class="rc-team r">
          <div class="rc-team-name">${t2names}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function pickWinner(w) {
  pickedWinner = w;
  document.querySelectorAll('.wopt').forEach(el=>{
    el.classList.toggle('selected', el.dataset.w===w);
  });
  const btn=document.getElementById('savebtn');
  if(btn) btn.disabled=false;
}

function renderAdd() {
  const today=new Date().toISOString().slice(0,10);

  if(draw && draw.teams.length>=2) {
    const t1=draw.teams[0], t2=draw.teams[1];
    const n=id=>{const p=pById(id);return p?p.name:'?';};
    const t1label=t1.map(n).join(' & ');
    const t2label=t2.map(n).join(' & ');
    const w1sel=pickedWinner==='t1'?' selected':'';
    const w2sel=pickedWinner==='t2'?' selected':'';
    return `<div class="form">
      <div class="info-box">🔀 Using today's draw — tap the winning team</div>
      <div>
        <div class="fl">Who won?</div>
        <div class="winner-options">
          <div class="wopt${w1sel}" data-w="t1" onclick="pickWinner('t1')">
            <div class="wopt-label">Team 1</div>
            <div class="wopt-name">${t1.map(id=>`<div>${n(id)}</div>`).join('')}</div>
          </div>
          <div class="wopt${w2sel}" data-w="t2" onclick="pickWinner('t2')">
            <div class="wopt-label">Team 2</div>
            <div class="wopt-name">${t2.map(id=>`<div>${n(id)}</div>`).join('')}</div>
          </div>
        </div>
      </div>
      <div><div class="fl">Date</div><input type="date" id="dt" value="${today}"></div>
      <button class="btn" id="savebtn" onclick="addMatch()" ${pickedWinner?'':'disabled'}>Save result</button>
      <div class="saved" id="sv">✅ Saved!</div>
      <button class="btn-ghost" onclick="draw=null;pickedWinner=null;render()">Enter manually instead</button>
    </div>`;
  }

  // Manual — pick any 2 players as teams of 1
  const opts=S.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  return `<div class="form">
    <div class="info-box" style="background:#fef9e7;color:#b7950b">⚠️ Use the Draw tab for couple matches. This adds a 1v1.</div>
    <div><div class="fl">Winner</div><select id="sh">${opts}</select></div>
    <div><div class="fl">Loser</div><select id="ah">${opts}</select></div>
    <div><div class="fl">Date</div><input type="date" id="dt" value="${today}"></div>
    <button class="btn" onclick="addManual()">Save result</button>
    <div class="saved" id="sv">✅ Saved!</div>
  </div>`;
}

function addMatch() {
  if(!draw||!pickedWinner) return;
  const t1=draw.teams[0], t2=draw.teams[1];
  const date=document.getElementById('dt').value||new Date().toISOString().slice(0,10);
  S.matches.push({id:S.nid++,tw1:t1,tw2:t2,winner:pickedWinner,date});
  save();
  const sv=document.getElementById('sv');
  sv.style.display='block';
  setTimeout(()=>{sv.style.display='none';draw=null;pickedWinner=null;go('results');},1000);
}

function addManual() {
  const w=parseInt(document.getElementById('sh').value);
  const l=parseInt(document.getElementById('ah').value);
  if(w===l){alert('Pick two different players!');return;}
  const date=document.getElementById('dt').value||new Date().toISOString().slice(0,10);
  S.matches.push({id:S.nid++,tw1:[w],tw2:[l],winner:'t1',date});
  save();
  const sv=document.getElementById('sv');
  sv.style.display='block';
  setTimeout(()=>{sv.style.display='none';go('results');},1000);
}

function go(t) {
  tab=t;
  ['standings','draw','results','add'].forEach(id=>{
    document.getElementById(id).style.display=id===t?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['standings','draw','results','add'][i]===t);
  });
  render();
}

function render() {
  const fn={standings:renderStandings,draw:renderDraw,results:renderResults,add:renderAdd};
  document.getElementById(tab).innerHTML=fn[tab]();
  document.getElementById('sub').textContent=`${S.players.length} players · ${S.matches.length} matches`;
}

load(); render();

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
